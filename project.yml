name: LingoBuddy
options:
  bundleIdPrefix: com.aluan
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
settings:
  MARKETING_VERSION: "1.0"
  CURRENT_PROJECT_VERSION: "1"
targets:
  LingoBuddy:
    type: application
    platform: iOS
    sources:
      - path: LingoBuddyApp
      - path: Images
        buildPhase: resources
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.aluan.LingoBuddy
      INFOPLIST_FILE: LingoBuddyApp/Info.plist
      INFOPLIST_KEY_UILaunchStoryboardName: LaunchScreen
      TARGETED_DEVICE_FAMILY: "1"
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      DEVELOPMENT_TEAM: ""
      CODE_SIGN_STYLE: Automatic
